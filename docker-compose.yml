services:
  
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nest-api
    restart: unless-stopped

    env_file:
      - ./backend/.env

    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      REFRESH_SECRET: ${REFRESH_SECRET}
      REFRESH_EXPIRES_IN: ${REFRESH_EXPIRES_IN}

    volumes:
      - ./backend:/app
      - /app/node_modules

    command: npm run start:dev

    ports:
      - "3001:3001"

    depends_on:
      - postgres
      - redis

    networks:
      - app-network


  postgres:
    image: postgres:17
    container_name: barber-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PG_DATA: /var/lib/postgresql/pgdata
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:alpine
    container_name: barber-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
 pgdata:
 redis_data:

networks:
  app-network:
    driver: bridge
